short_bio: >-
  <p>
   I am a Human-Computer Interaction (HCI) and design researcher, currently pursuing a Ph.D. candidate in the Computational Media and Arts Thrust, Information Hub, at The Hong Kong University of Science and Technology (Guangzhou), supervised by Prof.
  <a href="https://history.siggraph.org/person/dr-david-kei-man-yip/" target="_blank">David Yip</a>
  and Prof. <a href="https://scholar.google.com/citations?user=zDP7MBUAAAAJ&hl=en" target="_blank">Anca-Simona Horvath</a>. 
  <p> 
    My research focuses on Human-Centered Computing, aiming to understand and model how technology shapes human behavior and societal dynamics. I am particularly interested in interactive AI for digital cultural heritage, including AIGC-enabled experiences for heritage interpretation, storytelling, and preservation. 
  <p> 
    My research has appeared in premier HCI journals and conference proceedings, including Ubicomp (IMWUT), CHI, CSCW, IUI, and DIS.
    My art and design work has been featured in exhibitions such as ISEA, VINCI, CAA and CAFA. 
  </p>


